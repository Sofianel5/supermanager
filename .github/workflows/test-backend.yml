name: Test Backend

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/test-backend.yml
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - vendor/**
      - .gitmodules
  pull_request:
    paths:
      - .github/workflows/test-backend.yml
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - vendor/**
      - .gitmodules
  workflow_dispatch:

jobs:
  cargo-test:
    name: Coordination server tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres@127.0.0.1:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Run coordination-server tests
        run: cargo test -p coordination-server -- --nocapture
