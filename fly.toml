# fly.toml app configuration file generated for supermanager on 2026-03-31T23:13:15-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'supermanager'
primary_region = 'sjc'

[build]

[env]
  SUPERMANAGER_PUBLIC_API_URL = "https://supermanager.fly.dev"
  SUPERMANAGER_PUBLIC_APP_URL = "https://supermanager.pages.dev"

[[mounts]]
  source = 'supermanager_data'
  destination = '/data'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
