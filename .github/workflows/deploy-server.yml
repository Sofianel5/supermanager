name: Deploy Server

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/deploy-server.yml
      - Cargo.toml
      - Cargo.lock
      - Dockerfile
      - .dockerignore
      - server/**
      - crates/**
      - vendor/**
      - .gitmodules
  workflow_dispatch:

concurrency:
  group: deploy-server-ecs
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to ECS
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      AWS_ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY }}
      AWS_ECS_CLUSTER: ${{ vars.AWS_ECS_CLUSTER }}
      AWS_ECS_SERVICE: ${{ vars.AWS_ECS_SERVICE }}
    steps:
      - name: Validate required configuration
        run: |
          set -euo pipefail
          for name in \
            AWS_REGION \
            AWS_DEPLOY_ROLE_ARN \
            AWS_ECR_REPOSITORY \
            AWS_ECS_CLUSTER \
            AWS_ECS_SERVICE
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub Actions variable ${name}"
              exit 1
            fi
          done

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          image_uri="${ECR_REGISTRY}/${AWS_ECR_REPOSITORY}:latest"
          docker build --tag "${image_uri}" .
          docker push "${image_uri}"

      - name: Force ECS deployment
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${AWS_ECS_CLUSTER}" \
            --service "${AWS_ECS_SERVICE}" \
            --force-new-deployment >/dev/null
          aws ecs wait services-stable \
            --cluster "${AWS_ECS_CLUSTER}" \
            --services "${AWS_ECS_SERVICE}"
